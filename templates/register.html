{% extends "base.html" %}

{% block title %}Cadastro | SAFE STAKE{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto bg-black border border-white/10 rounded-2xl p-8 space-y-6 glow">
  <div class="text-center space-y-2">
    <img
      src="/static/img/safestake-01.svg"
      alt="SAFE STAKE"
      class="h-6 mx-auto"
    />
    <h1 class="font-title text-2xl uppercase">Criar Conta</h1>
    <p class="text-gray-400 text-sm">Cadastre-se para entrar no ecossistema Safe Stake.</p>
  </div>

  {% if error %}
  <div class="border border-red-500/40 text-red-300 bg-red-500/10 px-4 py-3 rounded-xl text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form class="space-y-4" method="post" action="/register">
    <div class="rounded-xl border border-emerald-400/40 bg-emerald-400/10 px-4 py-3 text-sm text-emerald-200">
      Todas as contas novas são cadastradas como <span class="font-semibold">APOIADOR</span>.
    </div>

    <div class="space-y-2">
      <label class="text-xs text-gray-400">Nome completo</label>
      <input
        type="text"
        name="nome"
        value="{{ form_data.nome or '' }}"
        placeholder="Seu nome"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>

    <div class="space-y-2">
      <label class="text-xs text-gray-400">Email</label>
      <input
        type="email"
        name="email"
        value="{{ form_data.email or '' }}"
        placeholder="voce@safestake.com"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>

    <div class="space-y-2">
      <label class="text-xs text-gray-400">Senha</label>
      <input
        type="password"
        name="senha"
        id="senha"
        placeholder="Mínimo 8, com letra e número"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Tipo de chave PIX</label>
      <select id="pix_key_type" class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400">
        <option value="cpf">CPF</option>
        <option value="email">E-mail</option>
        <option value="telefone">Telefone</option>
      </select>
    </div>
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Chave Pix (obrigatória para recebimento de lucros)</label>
      <input
        type="text"
        id="pix_key_input"
        name="pix_key"
        value="{{ form_data.pix_key or '' }}"
        placeholder="000.000.000-00"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
        maxlength="14"
        autocomplete="off"
      />
    </div>
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Confirmar senha</label>
      <input
        type="password"
        name="confirmar_senha"
        id="confirmar_senha"
        placeholder="Digite a senha novamente"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>

    <input type="hidden" name="tipo" value="apoiador" />

    <button
      type="submit"
      class="w-full px-5 py-3 rounded-full bg-emerald-400 text-black font-semibold shadow-lg shadow-emerald-400/30"
    >
      Criar Conta
    </button>
  </form>

  <p class="text-center text-sm text-gray-500">
    Já tem conta?
    <a href="/login" class="text-emerald-400 hover:text-emerald-300">Entrar</a>
  </p>
</section>

<script>
  const passwordInput = document.getElementById("senha");
  const confirmPasswordInput = document.getElementById("confirmar_senha");

  if (confirmPasswordInput && passwordInput) {
    confirmPasswordInput.addEventListener("input", () => {
      if (confirmPasswordInput.value && confirmPasswordInput.value !== passwordInput.value) {
        confirmPasswordInput.setCustomValidity("As senhas não conferem.");
      } else {
        confirmPasswordInput.setCustomValidity("");
      }
    });
  }

  (function () {
    const typeSelect = document.getElementById("pix_key_type");
    const input = document.getElementById("pix_key_input");
    if (!typeSelect || !input) return;

    function maskPix(value, type) {
      const digits = value.replace(/\D/g, "");
      if (type === "cpf") {
        return digits.slice(0, 11).replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
      }
      if (type === "telefone") {
        if (digits.length <= 2) return digits.replace(/(\d{0,2})/, "($1");
        if (digits.length <= 7) return digits.replace(/(\d{2})(\d{0,5})/, "($1) $2");
        return digits.slice(0, 11).replace(/(\d{2})(\d{5})(\d{0,4})/, "($1) $2-$3");
      }
      return value;
    }

    function applyMask() {
      const type = typeSelect.value;
      const start = input.selectionStart;
      const oldLen = input.value.length;
      input.value = maskPix(input.value, type);
      if (type === "cpf") input.setAttribute("maxlength", "14");
      else if (type === "telefone") input.setAttribute("maxlength", "15");
      else input.removeAttribute("maxlength");
      const newLen = input.value.length;
      input.setSelectionRange(Math.max(0, start + (newLen - oldLen)), Math.max(0, start + (newLen - oldLen)));
    }

    typeSelect.addEventListener("change", () => { input.value = ""; input.placeholder = typeSelect.value === "cpf" ? "000.000.000-00" : typeSelect.value === "telefone" ? "(00) 00000-0000" : "seu@email.com"; applyMask(); });
    input.addEventListener("input", applyMask);
  })();
</script>
{% endblock %}
