{% extends "base.html" %}

{% block title %}Cadastro | SAFE STAKE{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto bg-black border border-white/10 rounded-2xl p-8 space-y-6 glow">
  <div class="text-center space-y-2">
    <img
      src="/static/img/safestake-01.svg"
      alt="SAFE STAKE"
      class="h-6 mx-auto"
    />
    <h1 class="font-title text-2xl uppercase">Criar Conta</h1>
    <p class="text-gray-400 text-sm">Cadastre-se para entrar no ecossistema Safe Stake.</p>
  </div>

  {% if error %}
  <div class="border border-red-500/40 text-red-300 bg-red-500/10 px-4 py-3 rounded-xl text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form class="space-y-4" method="post" action="/register">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <label class="cursor-pointer rounded-xl border border-white/10 px-4 py-3 flex items-center gap-3 hover:border-emerald-400 transition">
        <input
          type="radio"
          name="tipo"
          value="jogador"
          class="accent-emerald-400"
          {% if (form_data.tipo or "jogador") == "jogador" %}checked{% endif %}
        />
        <span class="text-sm">Quero ser <span class="text-emerald-400 font-semibold">JOGADOR</span></span>
      </label>
      <label class="cursor-pointer rounded-xl border border-white/10 px-4 py-3 flex items-center gap-3 hover:border-emerald-400 transition">
        <input
          type="radio"
          name="tipo"
          value="apoiador"
          class="accent-emerald-400"
          {% if form_data.tipo == "apoiador" %}checked{% endif %}
        />
        <span class="text-sm">Quero ser <span class="text-emerald-400 font-semibold">APOIADOR</span></span>
      </label>
    </div>

    <div class="space-y-2">
      <label class="text-xs text-gray-400">Nome completo</label>
      <input
        type="text"
        name="nome"
        value="{{ form_data.nome or '' }}"
        placeholder="Seu nome"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="space-y-2">
        <label class="text-xs text-gray-400">Email</label>
        <input
          type="email"
          name="email"
          value="{{ form_data.email or '' }}"
          placeholder="voce@safestake.com"
          class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
          required
        />
      </div>
      <div class="space-y-2">
        <label class="text-xs text-gray-400">Telefone</label>
        <input
          type="text"
          name="telefone"
          id="telefone"
          value="{{ form_data.telefone or '' }}"
          placeholder="(11) 99999-9999"
          class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
          required
        />
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="space-y-2">
        <label class="text-xs text-gray-400">CPF/CNPJ</label>
        <input
          type="text"
          name="cpf_cnpj"
          id="cpf_cnpj"
          value="{{ form_data.cpf_cnpj or '' }}"
          placeholder="Somente números"
          class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
          required
        />
      </div>
      <div class="space-y-2">
        <label class="text-xs text-gray-400">Senha</label>
        <input
          type="password"
          name="senha"
          id="senha"
          placeholder="Mínimo 8, com letra e número"
          class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
          required
        />
      </div>
    </div>
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Confirmar senha</label>
      <input
        type="password"
        name="confirmar_senha"
        id="confirmar_senha"
        placeholder="Digite a senha novamente"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>

    <div id="jogadorFields" class="space-y-2 {% if form_data.tipo == 'apoiador' %}hidden{% endif %}">
      <label class="text-xs text-gray-400">Link do SharkScope (somente Jogador)</label>
      <input
        type="url"
        name="sharkscope_link"
        value="{{ form_data.sharkscope_link or '' }}"
        placeholder="https://www.sharkscope.com/..."
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
      />
    </div>

    <button
      type="submit"
      class="w-full px-5 py-3 rounded-full bg-emerald-400 text-black font-semibold shadow-lg shadow-emerald-400/30"
    >
      Criar Conta
    </button>
  </form>

  <p class="text-center text-sm text-gray-500">
    Já tem conta?
    <a href="/login" class="text-emerald-400 hover:text-emerald-300">Entrar</a>
  </p>
</section>

<script>
  const radios = document.querySelectorAll('input[name="tipo"]');
  const jogadorFields = document.getElementById("jogadorFields");
  const phoneInput = document.getElementById("telefone");
  const docInput = document.getElementById("cpf_cnpj");
  const passwordInput = document.getElementById("senha");
  const confirmPasswordInput = document.getElementById("confirmar_senha");

  function toggleJogadorFields() {
    const selected = document.querySelector('input[name="tipo"]:checked')?.value;
    if (selected === "jogador") {
      jogadorFields?.classList.remove("hidden");
      return;
    }
    jogadorFields?.classList.add("hidden");
  }

  radios.forEach((radio) => {
    radio.addEventListener("change", toggleJogadorFields);
  });

  function onlyDigits(value) {
    return value.replace(/\D/g, "");
  }

  function maskPhone(value) {
    const digits = onlyDigits(value).slice(0, 11);
    if (digits.length <= 2) return digits;
    if (digits.length <= 6) return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
    if (digits.length <= 10) return `(${digits.slice(0, 2)}) ${digits.slice(2, 6)}-${digits.slice(6)}`;
    return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7)}`;
  }

  function maskCpfCnpj(value) {
    const digits = onlyDigits(value).slice(0, 14);
    if (digits.length <= 11) {
      if (digits.length <= 3) return digits;
      if (digits.length <= 6) return `${digits.slice(0, 3)}.${digits.slice(3)}`;
      if (digits.length <= 9) return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6)}`;
      return `${digits.slice(0, 3)}.${digits.slice(3, 6)}.${digits.slice(6, 9)}-${digits.slice(9)}`;
    }
    if (digits.length <= 2) return digits;
    if (digits.length <= 5) return `${digits.slice(0, 2)}.${digits.slice(2)}`;
    if (digits.length <= 8) return `${digits.slice(0, 2)}.${digits.slice(2, 5)}.${digits.slice(5)}`;
    if (digits.length <= 12) return `${digits.slice(0, 2)}.${digits.slice(2, 5)}.${digits.slice(5, 8)}/${digits.slice(8)}`;
    return `${digits.slice(0, 2)}.${digits.slice(2, 5)}.${digits.slice(5, 8)}/${digits.slice(8, 12)}-${digits.slice(12)}`;
  }

  if (phoneInput) {
    phoneInput.addEventListener("input", () => {
      phoneInput.value = maskPhone(phoneInput.value);
    });
    phoneInput.value = maskPhone(phoneInput.value);
  }

  if (docInput) {
    docInput.addEventListener("input", () => {
      docInput.value = maskCpfCnpj(docInput.value);
    });
    docInput.value = maskCpfCnpj(docInput.value);
  }

  if (confirmPasswordInput && passwordInput) {
    confirmPasswordInput.addEventListener("input", () => {
      if (confirmPasswordInput.value && confirmPasswordInput.value !== passwordInput.value) {
        confirmPasswordInput.setCustomValidity("As senhas não conferem.");
      } else {
        confirmPasswordInput.setCustomValidity("");
      }
    });
  }

  toggleJogadorFields();
</script>
{% endblock %}
