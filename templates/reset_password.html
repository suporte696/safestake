{% extends "base.html" %}

{% block title %}Redefinir Senha | SAFE STAKE{% endblock %}

{% block content %}
<section class="max-w-lg mx-auto bg-black border border-white/10 rounded-2xl p-8 space-y-6 glow">
  <div class="text-center space-y-2">
    <img
      src="/static/img/safestake-01.svg"
      alt="SAFE STAKE"
      class="h-6 mx-auto"
    />
    <h1 class="font-title text-2xl uppercase">Redefinir senha</h1>
    <p class="text-gray-400 text-sm">Informe o código recebido por email e a nova senha.</p>
  </div>

  {% if error %}
  <div class="border border-red-500/40 text-red-300 bg-red-500/10 px-4 py-3 rounded-xl text-sm">
    {{ error }}
  </div>
  {% endif %}

  {% if info %}
  <div class="border border-emerald-500/40 text-emerald-200 bg-emerald-500/10 px-4 py-3 rounded-xl text-sm">
    {{ info }}
  </div>
  {% endif %}

  <form class="space-y-4" method="post" action="/reset-password">
    <input type="hidden" name="email" value="{{ email or '' }}" />
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Código de verificação</label>
      <input
        type="text"
        name="code"
        maxlength="6"
        placeholder="000000"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Nova senha</label>
      <input
        type="password"
        name="new_password"
        placeholder="8+ caracteres, letras e números"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Confirmar nova senha</label>
      <input
        type="password"
        name="confirm_password"
        placeholder="Repita a nova senha"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>
    <button
      type="submit"
      class="w-full px-5 py-3 rounded-full bg-emerald-400 text-black font-semibold shadow-lg shadow-emerald-400/30"
    >
      Salvar nova senha
    </button>
  </form>

  <div class="pt-2 space-y-1 text-center text-sm">
    <a href="/login" class="text-gray-400 hover:text-emerald-400 transition">Voltar para login</a>
  </div>
</section>
{% endblock %}
