{% extends "base.html" %}

{% block title %}Login | SAFE STAKE{% endblock %}

{% block content %}
<section class="max-w-lg mx-auto bg-black border border-white/10 rounded-2xl p-8 space-y-6">
  <div class="text-center space-y-2">
    <img
      src="/static/img/safestake-01.svg"
      alt="SAFE STAKE"
      class="h-6 mx-auto"
    />
    <h1 class="font-title text-2xl uppercase">Entrar</h1>
    <p class="text-gray-400 text-sm">Acesse sua conta para investir em players.</p>
  </div>

  {% if error %}
  <div class="border border-red-500/40 text-red-300 bg-red-500/10 px-4 py-3 rounded-xl text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form class="space-y-4" method="post" action="/login">
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Email</label>
      <input
        type="email"
        name="email"
        placeholder="voce@safestake.com"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>
    <div class="space-y-2">
      <label class="text-xs text-gray-400">Senha</label>
      <input
        type="password"
        name="senha"
        placeholder="••••••"
        class="w-full bg-[#0b0b0b] border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400"
        required
      />
    </div>
    <button
      type="submit"
      class="w-full px-5 py-3 rounded-full bg-emerald-400 text-black font-semibold shadow-lg shadow-emerald-400/30"
    >
      Entrar
    </button>
  </form>
</section>
{% endblock %}
